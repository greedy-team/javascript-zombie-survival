<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>좀비 아포칼립스: 감염자의 이지선다</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="container">

    <div class="bg-effect">
      <div class="bg-blob bg-blob-red"></div>
      <div class="bg-blob bg-blob-green"></div>
    </div>
    <div class="scanline"></div>

    <header class="header">
      <div class="header-line"></div>
      <h1 class="header-title">⚠ 감염자의 이지선다 ⚠</h1>
      <div class="header-line"></div>
    </header>

    <div id="game-screen">

      <section class="stats">
        <div class="stat-tape"></div>
        <div class="stat-item stat-border">
          <span class="stat-label">일차</span>
          <span class="stat-value stat-day" id="day">1</span>
        </div>
        <div class="stat-item stat-border">
          <span class="stat-label">체력</span>
          <span class="stat-value stat-hp" id="hp">100</span>
        </div>
        <div class="stat-item stat-border">
          <span class="stat-label">식량</span>
          <span class="stat-value stat-food" id="food">3</span>
        </div>
        <div class="stat-item stat-border">
          <span class="stat-label">감염</span>
          <span class="stat-value stat-infection" id="infection">10</span>
        </div>
        <div class="stat-item stat-border">
          <span class="stat-label">치료</span>
          <span class="stat-value stat-heal" id="heal-attempts">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">구조</span>
          <span class="stat-value stat-rescue" id="rescue-points">0</span>
        </div>
      </section>

      <section id="draw-area">
        <button id="btn-draw" class="draw-button">
          <div class="blood-spot blood-spot-1"></div>
          <div class="blood-spot blood-spot-2"></div>
          <div class="draw-border"></div>
          <div class="draw-content">
            <div class="draw-skull">☠</div>
            <span class="draw-text">카드 뽑기</span>
            <div class="draw-remaining">
              <span class="draw-remaining-label">남은 카드</span>
              <span class="draw-remaining-count" id="deck-remaining">20</span>
            </div>
          </div>
          <div class="draw-glow"></div>
          <div class="draw-stripe"></div>
        </button>
      </section>

      <section id="card-area" class="hidden">
        <div class="card">
          <div class="blood-spot blood-spot-1"></div>
          <div class="blood-spot blood-spot-2"></div>
          <div class="card-border"></div>
          <div class="card-warning card-warning-left">⚠</div>
          <div class="card-warning card-warning-right">⚠</div>
          <div class="card-content">
            <p class="card-skull">☠</p>
            <p id="card-name"></p>
            <p id="card-description"></p>
          </div>
          <div class="card-glow"></div>
          <div class="card-stripe card-stripe-top"></div>
          <div class="card-stripe card-stripe-bottom"></div>
        </div>
        <div id="choices">
          <button id="btn-choice-a" class="choice-button choice-a">
            <div class="choice-line"></div>
            <span class="choice-key">선택지 A</span>
            <span class="choice-label"></span>
            <span class="choice-desc"></span>
            <div class="choice-glow"></div>
          </button>
          <div class="choice-sep">
            <div class="choice-sep-bg"></div>
            <span class="choice-or">OR</span>
          </div>
          <button id="btn-choice-b" class="choice-button choice-b">
            <div class="choice-line"></div>
            <span class="choice-key">선택지 B</span>
            <span class="choice-label"></span>
            <span class="choice-desc"></span>
            <div class="choice-glow"></div>
          </button>
        </div>
      </section>

      <div id="loading" class="hidden">
        <div class="loading-text">처리 중</div>
        <div class="loading-dots">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </div>
      </div>

      <button id="btn-giveup" class="give-up-button">
        <span class="give-up-text">☠ 포기 ☠</span>
        <div class="give-up-glow"></div>
      </button>

      <div class="log-wrapper">
        <div class="log-header">
          <span class="log-title">상황 기록</span>
          <span class="log-arrow">▼</span>
        </div>
        <div id="log"></div>
      </div>

    </div>

    <!-- 결과 화면 -->
    <div id="result-screen" class="hidden">
      <div class="result-container">
        <div class="result-card">
          <div class="result-tape result-tape-top"></div>
          <div class="result-tape result-tape-bottom"></div>
          <div class="blood-spot blood-spot-1"></div>
          <div class="blood-spot blood-spot-2"></div>
          <div class="result-content">
            <p class="result-status">게임 종료</p>
            <p id="result-ending" class="result-ending"></p>
          </div>
        </div>
        <div class="final-stats">
          <div class="final-stats-header">
            <span class="final-stats-title">최종 기록</span>
          </div>
          <div class="final-stat-row">
            <span class="final-stat-label">생존 일수</span>
            <span class="final-stat-value final-stat-days" id="result-days"></span>
          </div>
          <div class="final-stat-row">
            <span class="final-stat-label">최종 체력</span>
            <span class="final-stat-value" id="result-hp"></span>
          </div>
          <div class="final-stat-row">
            <span class="final-stat-label">최종 식량</span>
            <span class="final-stat-value" id="result-food"></span>
          </div>
          <div class="final-stat-row">
            <span class="final-stat-label">최종 감염도</span>
            <span class="final-stat-value" id="result-infection"></span>
          </div>
        </div>
        <button id="btn-restart" class="restart-button">
          <span class="restart-text">다시 시작</span>
          <div class="restart-glow"></div>
        </button>
      </div>
    </div>

  </div>

  <script type="module" src="src/index.js"></script>
</body>
</html>
